# Cache source tarballs by sha256 (content-addressed, independent of recipe
# revision) so editing a recipe no longer triggers a source re-download.
core.sources:download_cache={{ conan_home_folder }}/sources_backup

# Hide symbols by default on Apple platforms to prevent JUCE symbol
# collisions between the host binary and loaded plugins (CFBundle dlopen
# resolves undefined symbols against the host process).
tools.apple:enable_visibility=False

{% if platform.system() == "Windows" %}
# compute a unique hash based on the current home folder
{% set h = hashlib.new("sha256", conan_home_folder.encode(),
                       usedforsecurity=False).hexdigest() %}
# and use the first 6 characters to compose a short path for package storage
core.cache:storage_path=C:/conan_{{h[:6]}}
{% endif %}
