check:build-without-pch:
  extends: .gnu-linux-template
  stage: check
  needs: []
  script:
    - conan install . -pr:h gcc_release -pr:b gcc_release --build=missing --lockfile=conan.lock
    - cmake --preset default -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON -DZRYTHM_UNITY_BUILD=OFF -DZRYTHM_TESTS=OFF
    - cmake --build conanbuild/Release --parallel

# AddressSanitizer/LeakSanitizer/MemorySanitizer are not needed since we are
# running valgrind anyway

build:gnu/linux:
  extends: .gnu-linux-template
  stage: build
  needs:
    - job: configure:gnu/linux
      artifacts: true
      parallel:
        matrix:
          - BUILD_TYPE: $[[ matrix.BUILD_TYPE ]]
            HOST_PROFILE: $[[ matrix.HOST_PROFILE ]]
    - job: check:exif
    - job: check:reuse
    - job: check:clang-format
  timeout: 2h # a lot of tools are run here
  script:
    - cmake --build conanbuild/${BUILD_TYPE} --config ${BUILD_TYPE} --parallel --target all all_verify_interface_header_sets
    - *unix_test_cmd
    # Run valgrind tests in parallel because they take a long time
    - >-
      ctest --test-dir conanbuild/${BUILD_TYPE} --parallel $(($(nproc) / 2)) --test-load $(($(nproc) / 2))
      --overwrite MemoryCheckCommandOptions="--undef-value-errors=no --exit-on-first-error=yes --error-exitcode=1"
      -T memcheck -E "(appstream-util-validate-appdata|zrythm_gui_qml_unit_tests)" --rerun-failed --output-on-failure
    - APPIMAGE_EXTRACT_AND_RUN=1 cpack -G AppImage -C ${BUILD_TYPE} --config conanbuild/${BUILD_TYPE}/CPackConfig.cmake -B package-${BUILD_TYPE}
  parallel:
    matrix:
      - BUILD_TYPE: Debug
        HOST_PROFILE: gcc_debug
      - BUILD_TYPE: Release
        HOST_PROFILE: gcc_release
  artifacts:
    paths:
      - conanbuild/${BUILD_TYPE}/version.env
      - package-${BUILD_TYPE}/*.AppImage*
      - conanbuild/${BUILD_TYPE}/test_results/*.xml
    when: always # Not ideal, see GitLab.com #18744
    expire_in: "1 day"
    reports:
      junit: conanbuild/${BUILD_TYPE}/test_results/*.xml
  coverage: '/Percentage Coverage:\s+(\d+\.\d+)%$/'

build:mac-arm:
  extends: .mac-arm-template
  stage: build
  timeout: 2h # Takes slightly longer than 1h
  needs:
    - job: configure:mac-arm
      artifacts: true
      parallel:
        matrix:
          - BUILD_TYPE: $[[ matrix.BUILD_TYPE ]]
            HOST_PROFILE: $[[ matrix.HOST_PROFILE ]]
  script:
    # Limit parallel jobs because xcode clang forces a whole system restart when building debug builds
    - cmake --build conanbuild/${BUILD_TYPE} --config ${BUILD_TYPE} --parallel 4
    - *unix_test_cmd
    - cpack -G "DragNDrop" -C ${BUILD_TYPE} --config conanbuild/${BUILD_TYPE}/CPackConfig.cmake -B package-${BUILD_TYPE}
    - >-
      if [ "${BUILD_TYPE}" = "Release" ]; then
        scripts/mac_codesign_and_notarize_dmg.sh "package-${BUILD_TYPE}"/*.dmg "Developer ID Application: Alexandros Theodotou ($APPLE_NOTARIZATION_TEAM_ID)"
      else
        scripts/mac_codesign_dmg_for_debug.sh "package-${BUILD_TYPE}"/*.dmg "Developer ID Application: Alexandros Theodotou ($APPLE_NOTARIZATION_TEAM_ID)"
      fi
  parallel:
    matrix:
      - BUILD_TYPE: Debug
        HOST_PROFILE: appleclang_debug
      - BUILD_TYPE: Release
        HOST_PROFILE: appleclang_release
  artifacts:
    paths:
      - package-${BUILD_TYPE}/*.dmg*
      - conanbuild/${BUILD_TYPE}/test_results/*.xml
    when: always
    expire_in: "1 day"
    reports:
      junit: conanbuild/${BUILD_TYPE}/test_results/*.xml

build:windows:
  extends: .windows-template
  stage: build
  timeout: 3h # release build takes >2h
  needs:
    - job: configure:windows
      artifacts: true
      parallel:
        matrix:
          - BUILD_TYPE: $[[ matrix.BUILD_TYPE ]]
            HOST_PROFILE: $[[ matrix.HOST_PROFILE ]]
  script:
    # MSBuild flags for VS generator: -- /verbosity:minimal "/consoleLoggerParameters:NoSummary;ForceConsoleColor"
    - cmake --build "conanbuild/${env:BUILD_TYPE}" --config "${env:BUILD_TYPE}" --parallel
    - if (! $?) { exit 1 }
    - ctest --test-dir "conanbuild/${env:BUILD_TYPE}" -C "${env:BUILD_TYPE}" -D NightlyTest -D NightlySubmit --rerun-failed --output-on-failure
    - if ("${env:BUILD_TYPE}" -eq "Release") { cmake --build "conanbuild/${env:BUILD_TYPE}" --config "${env:BUILD_TYPE}" --target run_all_benchmarks }
    # Use shorter path for packaging to avoid Windows path length limitations
    - $shortPackageDir = "C:\tmp\package-${env:BUILD_TYPE}"
    - if (Test-Path $shortPackageDir) { Remove-Item -Recurse -Force $shortPackageDir }
    - New-Item -ItemType Directory -Path $shortPackageDir -Force
    - cpack -G INNOSETUP -C ${env:BUILD_TYPE} --config "conanbuild/${env:BUILD_TYPE}/CPackConfig.cmake" -B $shortPackageDir; if (-not $?) { Get-Content "$shortPackageDir/_CPack_Packages/win64/INNOSETUP/ISCCOutput.log"; exit 1 }
    # Move the resulting exe files to the expected location for artifacts
    - if (Test-Path "package-${env:BUILD_TYPE}") { Remove-Item -Recurse -Force "package-${env:BUILD_TYPE}" }
    - New-Item -ItemType Directory -Path "package-${env:BUILD_TYPE}" -Force
    - Move-Item "$shortPackageDir\*.exe*" "package-${env:BUILD_TYPE}\"
  parallel:
    matrix:
      - BUILD_TYPE: Debug
        HOST_PROFILE: msvc_debug
      - BUILD_TYPE: Release
        HOST_PROFILE: msvc_release
  artifacts:
    paths:
      - package-${BUILD_TYPE}/*.exe*
    when: on_success
    expire_in: "1 day"

update-manual:
  extends: .gnu-linux-template
  stage: deploy
  only:
    - master
    - tags
  needs:
    - job: build:gnu/linux
    - job: configure-for-tools:gnu/linux
      artifacts: true
  script:
    - cmake --build conanbuild/Debug --target manual_bundle &> manual_bundle_results.txt || (cat manual_bundle_results.txt && exit 1)
    - rsync -av --no-group --omit-dir-times --exclude '*.zip' conanbuild/Debug/doc/user/_rendered/* $REMOTE_CI_USER@www.zrythm.org:$REMOTE_USER_MANUAL_UPLOAD_PATH
  before_script:
    - *ssh-setup
    - *unix-activate-venv

update-dev-docs:
  extends: .gnu-linux-template
  stage: deploy
  only:
    - master
    - tags
  needs:
    - job: build:gnu/linux
    - job: configure-for-tools:gnu/linux
      artifacts: true
  script:
    - cmake --build conanbuild/Debug --target doxygen-docs &> gen_dev_docs_results.txt || (cat gen_dev_docs_results.txt && exit 1)
    - rsync -av --no-group --omit-dir-times conanbuild/Debug/doc/dev/html/* $REMOTE_CI_USER@www.zrythm.org:$REMOTE_DEV_DOCS_UPLOAD_PATH
  before_script:
    - *ssh-setup
    - *unix-activate-venv

deploy:installers:
  extends: .gnu-linux-template
  stage: deploy
  only:
    - master
    - tags
  needs:
    - job: build:windows
      artifacts: true
    - job: build:mac-arm
      artifacts: true
    - job: build:gnu/linux
      artifacts: true
  script:
    # Source version info generated by CMake during configure (see GetVersionFromGitTag.cmake)
    - source conanbuild/Release/version.env
    - VERSION_WITHOUT_V=$(echo $VERSION_STRING_FULL | sed 's/^v//')
    # Deploy Windows installer
    - windowsArtifact=$(find package-Release -name "*.exe" | head -n 1)
    - if [ -n "$windowsArtifact" ]; then
      python3 scripts/deploy_file_to_s3.py --prefix "packages/windows" "$windowsArtifact";
      fi
    # Deploy macOS DMG
    - macArtifact=$(find package-Release -name "*.dmg" | head -n 1)
    - if [ -n "$macArtifact" ]; then
      python3 scripts/deploy_file_to_s3.py --prefix "packages/macos-universal" "$macArtifact";
      fi
    # Deploy Linux AppImage
    - gnuLinuxAppImageArtifact=$(find package-Release -name "*.AppImage" | head -n 1)
    - if [ -n "$gnuLinuxAppImageArtifact" ]; then
      python3 scripts/deploy_file_to_s3.py --prefix "packages/gnu-linux-cpack" "$gnuLinuxAppImageArtifact";
      fi
    # Create product on accounts.zrythm.org
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        python3 scripts/create_zrythm_accounts_product.py --version "$VERSION_WITHOUT_V" --tag
      else
        python3 scripts/create_zrythm_accounts_product.py --version "$VERSION_WITHOUT_V"
      fi
  dependencies:
    - build:windows
    - build:mac-arm
    - build:gnu/linux
  before_script:
    - *unix-activate-venv

deploy:github-release:
  extends: .gnu-linux-template
  stage: deploy
  only:
    - tags
  needs:
    - job: deploy:installers
    - job: build:gnu/linux
      artifacts: true
      parallel:
        matrix:
          - BUILD_TYPE: Release
            HOST_PROFILE: gcc_release
  script:
    - source conanbuild/Release/version.env
    - VERSION_WITHOUT_V=$(echo $VERSION_STRING_FULL | sed 's/^v//')
    - python3 scripts/create_github_release.py "$VERSION_WITHOUT_V"
  before_script:
    - *unix-activate-venv
