workflow:
  rules:
    # run merge request pipelines
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # do not run branch pipelines if corresponding merge requests exist...
    # (this avoids duplicate pipelines)
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # ...but otherwise run branch pipelines (unless this commit is also tagged)
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH
    # run tag pipelines
    - if: $CI_COMMIT_TAG

stages:
  - setup
  - check
  - build # also test & package
  - deploy

.unix-activate-venv: &unix-activate-venv
  - python3 -m venv venv
  - source ./venv/bin/activate
  - python3 -m pip install -r requirements.txt
  - conan config install conan
  - conan remote list | grep -q conan-local-index || conan remote add conan-local-index ext/conan-center-index
  - python3 tools/export_conan_recipes.py
  - export CPM_SOURCE_CACHE="${HOME}/.cache/CPM"

.ssh-setup: &ssh-setup
  - eval $(ssh-agent -s)
  - chmod 400 "$SSH_PRIVATE_KEY"
  - ssh-add "$SSH_PRIVATE_KEY"
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh
  - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  - chmod 600 "$SSH_PRIVATE_KEY"

.windows-activate-venv: &windows-activate-venv
  - ./venv/Scripts/Activate.ps1
  # Temporary solution until cmake 4.2.0 release
  - $Env:PATH = "C:\Program Files\Microsoft Visual Studio\18\Community\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin$([System.IO.Path]::PathSeparator)$Env:PATH"

# .mac-enable-brew-env: &mac-enable-brew-env
# - eval "$(/opt/homebrew/bin/brew shellenv)";

.windows-enable-vs-env: &windows-enable-vs-env
  - Import-Module "C:\Program Files\Microsoft Visual Studio\18\Community\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
  - >-
    Enter-VsDevShell
    -VsInstallPath "C:\Program Files\Microsoft Visual Studio\18\Community"
    -SkipAutomaticLocation
    -DevCmdArguments -arch=x64
  #- chcp 65001 # UTF-8

.gnu-linux-template:
  tags:
    - ubuntu22
  variables:
    QT_QPA_PLATFORM: "offscreen"
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - *unix-activate-venv

.sanitizer-template:
  extends: .gnu-linux-template
  stage: check
  needs: []
  variables:
    HOST_PROFILE: "clang_debug"
    SANITIZER_OPTION: "address_undefined"
    RTSAN_OPTIONS: "suppressions=$CI_PROJECT_DIR/tools/rtsan_suppressions.supp"
  before_script:
    - *unix-activate-venv
  script:
    - conan install . -pr:h ${HOST_PROFILE} -pr:b gcc_release -o sanitizer="${SANITIZER_OPTION}" --build=missing --lockfile=conan.lock
    - cmake --preset default -DZRYTHM_UNITY_BUILD=OFF
    - cmake --build conanbuild/Debug --parallel
    - source conanbuild/Debug/generators/conanrun.sh && ctest --test-dir conanbuild/Debug --rerun-failed --output-on-failure
    - >-
      if [ "${CREATE_APPIMAGE}" = "ON" ]; then
        APPIMAGE_EXTRACT_AND_RUN=1 cpack -G AppImage -C Debug --config conanbuild/Debug/CPackConfig.cmake -B package-${SANITIZER_OPTION}-debug;
      fi

.mac-arm-template:
  tags:
    - mac-arm
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  before_script:
    - *unix-activate-venv

.windows-template:
  tags:
    - windows11
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
    INSTALLDIR: "install_windows"
    VSLANG: "1033"
    # use /MP1 to disable parallel builds if the compiler messages are hard to read
    CL: "/MP" # prepended to the cl command
    _CL_: "" # appended to the cl command
    _LINK_: ""
    CPM_SOURCE_CACHE: "C:/CPM-cache"
  before_script:
    - *windows-enable-vs-env
    - *windows-activate-venv

# Windows template with full environment setup (venv, conan, recipes).
# Use for jobs that don't depend on configure:windows artifacts.
.windows-with-conan:
  extends: .windows-template
  before_script:
    - *windows-enable-vs-env
    - python -m venv venv
    - *windows-activate-venv
    - python -m pip install -r requirements.txt
    - conan config install conan
    - $r = conan remote list 2>$null; if (-not ($r -match 'conan-local-index')) { conan remote add conan-local-index ext/conan-center-index }
    - python tools/export_conan_recipes.py

default:
  cache:
    # this number must be bumped every time these subprojects are updated
    - key: cache-34-$CI_RUNNER_DESCRIPTION
      paths:
        - venv
        - .cache/CPM

configure:gnu/linux:
  extends: .gnu-linux-template
  stage: setup
  variables:
    GIT_DEPTH: 0 # Fetch full history
  before_script:
    - *unix-activate-venv
  script:
    - conan install . -pr:h ${HOST_PROFILE} -pr:b gcc_release --build=missing --lockfile=conan.lock
    - >-
      cmake --preset default
      -DZRYTHM_USER_MANUAL=OFF
      -DZRYTHM_WITH_LIBDW=OFF
      -DZRYTHM_UNITY_BUILD=ON
      $(if [ "${BUILD_TYPE}" = "Debug" ]; then echo "-DZRYTHM_COVERAGE=ON"; fi)
  parallel:
    matrix:
      - BUILD_TYPE: Debug
        HOST_PROFILE: gcc_debug
      - BUILD_TYPE: Release
        HOST_PROFILE: gcc_release
  artifacts:
    paths:
      - conanbuild/${BUILD_TYPE}
    exclude:
      - conanbuild/${BUILD_TYPE}/**/.git/**/*
    expire_in: 1 day

configure-for-tools:gnu/linux:
  extends: .gnu-linux-template
  stage: setup
  before_script:
    - *unix-activate-venv
  script:
    - conan install . -pr:h clang_debug -pr:b gcc_release --build=missing --lockfile=conan.lock
    - cmake --preset default -DZRYTHM_USER_MANUAL=ON -DZRYTHM_UNITY_BUILD=OFF -DCMAKE_LINKER_TYPE=MOLD
  artifacts:
    paths:
      - conanbuild/Debug
    exclude:
      - conanbuild/Debug/**/.git/**/*
    expire_in: 1 day

configure:mac-arm:
  extends: .mac-arm-template
  stage: setup
  variables:
    GIT_DEPTH: 0 # Fetch full history
  before_script:
    - *unix-activate-venv
  script:
    - conan install . -pr:h ${HOST_PROFILE} -pr:b appleclang_build --build=missing --lockfile=conan.lock
    - >-
      cmake --preset default
      -DZRYTHM_UNITY_BUILD=ON
      -DAPPLE_APP_CODESIGN_IDENTITY="Developer ID Application: Alexandros Theodotou ($APPLE_NOTARIZATION_TEAM_ID)"
  parallel:
    matrix:
      - BUILD_TYPE: Debug
        HOST_PROFILE: appleclang_debug
      - BUILD_TYPE: Release
        HOST_PROFILE: appleclang_release
  artifacts:
    paths:
      - conanbuild/${BUILD_TYPE}
    exclude:
      - conanbuild/${BUILD_TYPE}/**/.git/**/*
    expire_in: 1 day

configure:windows:
  extends: .windows-with-conan
  stage: setup
  variables:
    GIT_DEPTH: 0 # Fetch full history
  script:
    - conan install . -pr:h ${env:HOST_PROFILE} -pr:b msvc_release --build=missing --lockfile=conan.lock
    - cmake --preset default -DZRYTHM_WITH_ASIO=ON
  parallel:
    matrix:
      - BUILD_TYPE: Debug
        HOST_PROFILE: msvc_debug
      - BUILD_TYPE: Release
        HOST_PROFILE: msvc_release
  artifacts:
    paths:
      - conanbuild/${BUILD_TYPE}
    exclude:
      - conanbuild/${BUILD_TYPE}/**/.git/**/*
    expire_in: 1 day

check:clazy:
  extends: .gnu-linux-template
  stage: check
  needs: []
  script:
    - export CLAZY_CHECKS="level0"
    - conan install . -pr:h clang_debug -pr:b gcc_release --build=missing --lockfile=conan.lock
    - cmake --preset default -DCMAKE_CXX_COMPILER=clazy -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON -DZRYTHM_UNITY_BUILD=OFF
    - cmake --build conanbuild/Debug --parallel || true # TODO

check:clang-format:
  extends: .gnu-linux-template
  stage: check
  needs: []
  script:
    - python3 scripts/run_clang_format.py --dry-run

check:reuse:
  extends: .gnu-linux-template
  stage: check
  needs: []
  script:
    - reuse lint

check:exif:
  extends: .gnu-linux-template
  stage: check
  needs: []
  script:
    - scripts/exif_check.sh

.unix_test_cmd: &unix_test_cmd
  - ctest --test-dir conanbuild/${BUILD_TYPE} -C ${BUILD_TYPE} -D NightlyTest --rerun-failed --output-on-failure
  - if [ "${BUILD_TYPE}" = "Debug" ]; then
      ctest --test-dir conanbuild/${BUILD_TYPE} -C ${BUILD_TYPE} -D NightlyCoverage ;
    fi
  - ctest --test-dir conanbuild/${BUILD_TYPE} -C ${BUILD_TYPE} -D NightlySubmit
  - if [ "${BUILD_TYPE}" = "Release" ]; then
      cmake --build conanbuild/${BUILD_TYPE} --config ${BUILD_TYPE} --target run_all_benchmarks ;
    fi

check:qmllint:
  extends: .gnu-linux-template
  stage: check
  needs:
    - job: configure:gnu/linux
      artifacts: true
      parallel:
        matrix:
          - BUILD_TYPE: Debug
            HOST_PROFILE: gcc_debug
  script:
    - (cmake --build conanbuild/Debug --config Debug --target all_qmllint 2>&1 || true) | tee qmllint_output.txt
    - |
      WARNING_COUNT=$(grep 'Warning: ' qmllint_output.txt | grep "${CI_PROJECT_DIR}/src/gui/qml/" | grep -v 'ZrythmStyle' | grep -v 'not found on type "QObject"' | grep -v 'not found on type "QQuickItem"' | grep -v 'Type "QColor" of property "color" not found' | wc -l)
      echo "QML lint warning count (filtered): ${WARNING_COUNT}"
      if [ "${WARNING_COUNT}" -gt 31 ]; then
        echo "Error: QML lint warning count (${WARNING_COUNT}) exceeds threshold (31)"
        # exit 1 # temporarily disabled
      fi
      echo "QML lint check passed"

check:clang-tidy:
  rules:
    - when: never # temporarily disable due to compilation issues
  extends: .gnu-linux-template
  stage: check
  needs:
    - job: configure-for-tools:gnu/linux
      artifacts: true
  script:
    - conan install . -pr:h clang_debug -pr:b gcc_release --build=missing --lockfile=conan.lock
    - cmake --preset default -DCMAKE_DISABLE_PRECOMPILE_HEADERS=ON -DZRYTHM_UNITY_BUILD=OFF
    - >-
      git diff -U0 HEAD^
      | python3 /usr/share/clang/clang-tidy-diff.py -p1
      -path conanbuild/Debug -config-file .clang-tidy
      -use-color

build:sanitizer-asan-ubsan:gnu-linux:
  extends: .sanitizer-template
  stage: build
  variables:
    CREATE_APPIMAGE: "ON"
  artifacts:
    paths:
      - package-${SANITIZER_OPTION}-debug/*.AppImage*
      - conanbuild/Debug/test_results/*.xml
    when: always
    expire_in: "1 day"
    reports:
      junit: conanbuild/Debug/test_results/*.xml

check:sanitizer-thread:
  extends: .sanitizer-template
  variables:
    HOST_PROFILE: "clang_tsan"
    SANITIZER_OPTION: "thread"

check:sanitizer-realtime:
  extends: .sanitizer-template
  variables:
    SANITIZER_OPTION: "realtime"

build:sanitizer-asan-ubsan:mac-arm:
  extends: .mac-arm-template
  stage: build
  timeout: 2h
  needs: []
  variables:
    HOST_PROFILE: "appleclang_debug"
  script:
    - conan install . -pr:h ${HOST_PROFILE} -pr:b appleclang_build -o sanitizer=address_undefined --build=missing --lockfile=conan.lock
    - cmake --preset default -DZRYTHM_UNITY_BUILD=OFF
    - cmake --build conanbuild/Debug --parallel 4
    - source conanbuild/Debug/generators/conanrun.sh && ctest --test-dir conanbuild/Debug --rerun-failed --output-on-failure
    - cpack -G "DragNDrop" -C Debug --config conanbuild/Debug/CPackConfig.cmake -B package-asan-ubsan-debug
    - >-
      scripts/mac_codesign_dmg_for_debug.sh "package-asan-ubsan-debug"/*.dmg "Developer ID Application: Alexandros Theodotou ($APPLE_NOTARIZATION_TEAM_ID)"
  artifacts:
    paths:
      - package-asan-ubsan-debug/*.dmg*
      - conanbuild/Debug/test_results/*.xml
    when: always
    expire_in: "1 day"
    reports:
      junit: conanbuild/Debug/test_results/*.xml

